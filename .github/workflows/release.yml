name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        emacs-version:
          - '27.1'
          - '28.1'
          - '29.1'
          - 'snapshot'

    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Byte compile
        run: emacs --batch -f batch-byte-compile tt-mode.el

      - name: Run tests
        run: emacs --batch -L . -l tt-mode-tests.el -f ert-run-tests-batch-and-exit

  release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          EL_VERSION=$(awk '/^;; Version:/ {print $3}' tt-mode.el)
          if [ "$TAG_VERSION" != "$EL_VERSION" ]; then
            echo "Version mismatch: tag is '$TAG_VERSION' but tt-mode.el says '$EL_VERSION'"
            exit 1
          fi
          echo "Version check passed: $EL_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tt-mode.el
          generate_release_notes: true
