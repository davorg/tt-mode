name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        emacs-version:
          - '27.1'
          - '28.1'
          - '29.1'
          - 'snapshot'

    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Byte compile
        run: emacs --batch -f batch-byte-compile tt-mode.el

      - name: Run tests
        run: emacs --batch -L . -l tt-mode-tests.el -f ert-run-tests-batch-and-exit
